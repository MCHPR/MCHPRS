# Map block property sets to a Rust enum type
prop_types:
  BlockDirection:
    - north
    - south
    - west
    - east
  BlockFacing:
    - north
    - east
    - south
    - west
    - up
    - down
  LeverFace:
    - floor
    - wall
    - ceiling
  HopperFacing:
    - down
    - north
    - south
    - west
    - east
  SlabType:
    - top
    - bottom
    - double
  BlockAxis:
    - x
    - y
    - z
  Instrument:
    - harp
    - basedrum
    - snare
    - hat
    - bass
    - flute
    - bell
    - guitar
    - chime
    - xylophone
    - iron_xylophone
    - cow_bell
    - didgeridoo
    - bit
    - banjo
    - pling
    - zombie
    - skeleton
    - creeper
    - dragon
    - wither_skeleton
    - piglin
    - custom_head
  RedstoneWireSide:
    - up
    - side
    - none
  TrapdoorHalf:
    - top
    - bottom
  ComparatorMode:
    - compare
    - subtract

# Items defined here are those that could not have been defined by the block `item` or
# `simple_item` attributes. This is either because the item has a non-standard stack
# size, does not have the same name as its block, or does not correspond to a block at
# all.

# Items can have the following attributes
# max_stack:##: the maximum number of this item that fits in one inventory slot
# block: this item can be placed

items:
  "minecraft:wooden_axe": "max_stack:1"
  "minecraft:snowball": "max_stack:16"
  "minecraft:totem_of_undying": "max_stack:1"
  "minecraft:milk_bucket": "max_stack:1"
  "minecraft:redstone": "block"
  "minecraft:ender_eye": ""
