# This file defines all the blocks that MCHPRS implements (or at least recognizes).
# It is used alongside the JSON reports generated by an official Minecraft server's
# data generators to generate the Block enum and associated functions.

# Blocks can have several attributes:
# solid: can be powered by redstone.
# cube: redstone can be placed on top of it.
# transparent: redstone cannot travel down the block.
# maybe_solid: depends on block state properties
# maybe_cube: depends on block state properties
# maybe_transparent: depends on block state properties
# prop_struct: make a separate struct containing block properties
# item: also creates an item with the same name
# simple_item: also create an item with the same name that gets simply placed when used.
#              This attribute cannot be used if the block has properties.
# complex_transform: used when properties cannot be transformed independently
# wool: note block instrument material
# wood: note block instrument material
# stone: note block instrument material
# glass: note block instrument material

blocks:
  "minecraft:air": ""
  "minecraft:stone": "solid,cube,simple_item,stone"
  "minecraft:glass": "transparent,cube,simple_item,glass"
